name: manipulator_simulation_setup
# root: ~/moveit_ws # You can uncomment this if your commands need a specific working directory, though absolute paths in commands are safer.

windows:
  - multi_manipulator_simulation:
      layout: tiled # Arranges panes; other options: even-horizontal, main-vertical, etc.
      panes:
        - multi_servo_launch:
            - echo "Launching ${ARM_COUNT:-1} namespaced Panda Servo stacks..."
            - ros2 launch custom_servo_demo multi_servo_example.launch.py arm_count:=${ARM_COUNT:-1} arm_prefix:=${ARM_PREFIX:-arm} use_joy_teleop:=${USE_JOY_TELEOP:-true} use_pose_stamped_control:=${USE_POSE_STAMPED_CONTROL:-true} launch_action_servers:=${LAUNCH_ACTION_SERVERS:-true} prepare_servo:=${PREPARE_SERVO:-true} behavior_tree_name:=${BEHAVIOR_TREE_NAME:-none} behavior_tree_timeout:=${BEHAVIOR_TREE_TIMEOUT:-60.0} use_gazebo_camera:=false scene_config:=${PICK_PLACE_SCENE_CONFIG:-/home/rosuser/moveit_ws/src/custom_servo_demo/config/pick_place_scene.yaml} launch_scene_camera:=${LAUNCH_SCENE_CAMERA:-false} wrist_camera_offset_roll:=${WRIST_CAMERA_OFFSET_ROLL:-0.0} wrist_camera_offset_pitch:=${WRIST_CAMERA_OFFSET_PITCH:-0.0} wrist_camera_offset_yaw:=${WRIST_CAMERA_OFFSET_YAW:-0.0}
        - wrist_cameras:
            - echo "Launching Gazebo wrist cameras for ${ARM_COUNT:-1} namespaced arm(s)..."
            - ros2 launch custom_servo_demo gazebo_wrist_camera.launch.py arm_count:=${ARM_COUNT:-1} arm_prefix:=${ARM_PREFIX:-arm} enabled:=${USE_GAZEBO_CAMERA:-true} use_prefixed_frames:=true scene_config:=${PICK_PLACE_SCENE_CONFIG:-/home/rosuser/moveit_ws/src/custom_servo_demo/config/pick_place_scene.yaml} launch_scene_camera:=${LAUNCH_SCENE_CAMERA:-false} wrist_camera_offset_roll:=${WRIST_CAMERA_OFFSET_ROLL:-0.0} wrist_camera_offset_pitch:=${WRIST_CAMERA_OFFSET_PITCH:--1.5708} wrist_camera_offset_yaw:=${WRIST_CAMERA_OFFSET_YAW:-0.0} wrist_camera_look_at_frame:=${WRIST_CAMERA_LOOK_AT_FRAME:-pick_place_table}
        - cors_mesh_server:
            - echo "Starting CORS-enabled HTTP server for meshes on port 8000 from /opt/ros/${ROS_DISTRO:-jazzy}/share/ ..."
            - python3 /home/rosuser/cors_mesh_server.py 8000 /opt/ros/${ROS_DISTRO:-jazzy}/share/
